name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      MODEL_NAME: ${{ vars.MODEL_NAME }}
      SESSION_HMAC_SECRET_VERSION: ${{ vars.SESSION_HMAC_SECRET_VERSION }}
      STEEL_API_KEY_VERSION: ${{ vars.STEEL_API_KEY_VERSION }}
      MODEL_API_KEY_VERSION: ${{ vars.MODEL_API_KEY_VERSION }}
      TURNSTILE_SECRET_VERSION: ${{ vars.TURNSTILE_SECRET_VERSION }}
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/product-demo/server:${{ github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
      - run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.7
      - run: terraform init -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=product-demo/production"
        working-directory: infra/terraform
      - run: terraform plan -input=false -out=tfplan -var="project_id=${PROJECT_ID}" -var="region=${REGION}" -var="container_image=${IMAGE}" -var="public_api_url=${PUBLIC_API_URL}" -var="model_name=${MODEL_NAME}" -var="session_hmac_secret_version=${SESSION_HMAC_SECRET_VERSION}" -var="steel_api_key_version=${STEEL_API_KEY_VERSION}" -var="model_api_key_version=${MODEL_API_KEY_VERSION}" -var="turnstile_secret_version=${TURNSTILE_SECRET_VERSION}"
        working-directory: infra/terraform
      - run: terraform apply -input=false -auto-approve tfplan
        working-directory: infra/terraform
      - run: npm ci && npm run build --workspace @product/sdk && npm run sdk:smoke && npm run sdk:size
        env:
          PRODUCT_DEMO_API_URL: ${{ env.PUBLIC_API_URL }}
      - run: gcloud storage cp packages/sdk/dist/product-demo.js "gs://${PROJECT_ID}-product-demo-sdk/${GITHUB_SHA}/product-demo.js" --cache-control="public,max-age=31536000,immutable" --content-type="application/javascript"
      - run: |
          echo "SDK SRI: $(npm run --silent sdk:sri)" >> "${GITHUB_STEP_SUMMARY}"
