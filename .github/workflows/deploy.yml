name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCT_DEMO_API_URL: https://api.example.com
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify source and coverage
        run: npm run typecheck && npm run lint && npm run test:coverage
      - name: Check formatting
        run: npm run format:check
      - name: Build release artifacts
        run: npm run build
      - name: Verify SDK release
        run: npm run sdk:smoke && npm run sdk:size
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.7
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive
      - name: Initialize Terraform
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform
      - name: Validate Terraform
        run: terraform validate
        working-directory: infra/terraform

  deploy:
    name: Deploy production
    needs: release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      MODEL_NAME: ${{ vars.MODEL_NAME }}
      SESSION_HMAC_SECRET_VERSION: ${{ vars.SESSION_HMAC_SECRET_VERSION }}
      STEEL_API_KEY_VERSION: ${{ vars.STEEL_API_KEY_VERSION }}
      MODEL_API_KEY_VERSION: ${{ vars.MODEL_API_KEY_VERSION }}
      TURNSTILE_SECRET_VERSION: ${{ vars.TURNSTILE_SECRET_VERSION }}
      IMAGE_NAME: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/product-demo/server
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/product-demo/server:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build and push production image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          provenance: mode=max
          sbom: true
      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.7
      - name: Initialize production Terraform
        run: terraform init -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=product-demo/production"
        working-directory: infra/terraform
      - name: Plan production changes
        run: terraform plan -input=false -out=tfplan -var="project_id=${PROJECT_ID}" -var="region=${REGION}" -var="container_image=${IMAGE}" -var="public_api_url=${PUBLIC_API_URL}" -var="model_name=${MODEL_NAME}" -var="session_hmac_secret_version=${SESSION_HMAC_SECRET_VERSION}" -var="steel_api_key_version=${STEEL_API_KEY_VERSION}" -var="model_api_key_version=${MODEL_API_KEY_VERSION}" -var="turnstile_secret_version=${TURNSTILE_SECRET_VERSION}"
        working-directory: infra/terraform
      - name: Apply production changes
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: infra/terraform
      - name: Build production SDK
        run: npm ci && npm run build --workspace @product/sdk && npm run sdk:smoke && npm run sdk:size
        env:
          PRODUCT_DEMO_API_URL: ${{ env.PUBLIC_API_URL }}
      - name: Publish immutable SDK
        run: gcloud storage cp packages/sdk/dist/product-demo.js "gs://${PROJECT_ID}-product-demo-sdk/${GITHUB_SHA}/product-demo.js" --cache-control="public,max-age=31536000,immutable" --content-type="application/javascript"
      - name: Verify deployed API
        run: |
          curl --fail --silent --show-error --retry 5 --retry-all-errors --retry-delay 5 --max-time 15 "${PUBLIC_API_URL%/}/healthz"
          curl --fail --silent --show-error --retry 5 --retry-all-errors --retry-delay 5 --max-time 15 "${PUBLIC_API_URL%/}/readyz"
      - name: Publish release summary
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "SDK SRI: $(npm run --silent sdk:sri)" >> "${GITHUB_STEP_SUMMARY}"
